name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, such as v1.0.1"
        required: true
      publish_foundry:
        description: "Publish the Foundry package version during manual dispatch"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FOUNDRY_PACKAGE_RELEASE_TOKEN: ${{ secrets.FOUNDRY_PACKAGE_RELEASE_TOKEN }}

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pack test dependency
        run: npm install --no-audit --no-fund --no-save classic-level

      - name: Validate module
        run: npm run validate

      - name: Confirm tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [ "v${package_version}" != "${{ steps.release.outputs.tag }}" ]; then
            echo "Tag ${{ steps.release.outputs.tag }} does not match package version v${package_version}" >&2
            exit 1
          fi

      - name: Build release package
        run: npm run build:release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes_file="docs/release-notes/${{ steps.release.outputs.tag }}.md"
          if [ ! -f "$notes_file" ]; then
            echo "Missing release notes file: $notes_file" >&2
            exit 1
          fi
          if gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.release.outputs.tag }}" \
              --title "${{ steps.release.outputs.tag }}" \
              --notes-file "$notes_file"
            gh release upload "${{ steps.release.outputs.tag }}" \
              dist/module.json \
              dist/d35e-piecemeal-armor-called-shots-${{ steps.release.outputs.tag }}.zip \
              --clobber
          else
            gh release create "${{ steps.release.outputs.tag }}" \
              dist/module.json \
              dist/d35e-piecemeal-armor-called-shots-${{ steps.release.outputs.tag }}.zip \
              --title "${{ steps.release.outputs.tag }}" \
              --notes-file "$notes_file" \
              --verify-tag
          fi

      - name: Publish Foundry package version
        if: env.FOUNDRY_PACKAGE_RELEASE_TOKEN != '' && (github.event_name != 'workflow_dispatch' || inputs.publish_foundry)
        run: npm run publish:foundry

      - name: Skip Foundry package publish
        if: env.FOUNDRY_PACKAGE_RELEASE_TOKEN == '' || (github.event_name == 'workflow_dispatch' && !inputs.publish_foundry)
        run: |
          if [ "${{ env.FOUNDRY_PACKAGE_RELEASE_TOKEN }}" = "" ]; then
            echo "FOUNDRY_PACKAGE_RELEASE_TOKEN is not configured; update the Foundry package listing manually."
          else
            echo "Manual dispatch skipped Foundry package publish; use publish_foundry=true to run it."
          fi
